<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AB Layout – Legal Formatting Engine</title>

<meta name="description" content="AB Layout is a Microsoft Word Add-in for Indian legal drafting with automated court formatting." />
<meta name="theme-color" content="#0f6cbd" />

<link rel="canonical" href="https://ratiojuris.github.io/ab-layout/" />
<link rel="icon" href="assets/icon-32.png" />

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Alpine JS -->
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

<!-- Axios -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100"
      x-data="app()" x-init="init()">

<!-- TOGGLE -->
<div class="absolute top-5 right-5 cursor-pointer text-xl" @click="toggleTheme()">🌗</div>

<div class="max-w-5xl mx-auto p-6">

<!-- HERO -->
<section class="text-center py-16">
  <h1 class="text-4xl font-bold mb-2">⚖ AB Layout</h1>
  <p class="text-gray-500" x-text="desc">Loading...</p>

  <div class="mt-6 space-x-3">
    <a href="manifest.xml"
       @click.prevent="downloadManifest"
       class="bg-blue-600 text-white px-5 py-2 rounded-md font-semibold">
       ⬇ Install Add-in
    </a>

    <a href="https://github.com/RatioJuris/ab-layout"
       class="border px-5 py-2 rounded-md">
       GitHub
    </a>
  </div>

  <div class="text-sm text-gray-500 mt-3" x-text="stats"></div>
  <div class="text-sm text-gray-500" x-text="version"></div>
</section>

<!-- LAYOUTS -->
<section class="mt-10">
  <h2 class="text-2xl font-semibold mb-4">📄 Layouts</h2>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
    <template x-for="l in layouts" :key="l.id">
      <div class="border rounded-lg p-4 bg-white dark:bg-gray-800 shadow-sm">
        <strong x-text="l.name"></strong>
        <div class="text-sm text-gray-500" x-text="l.type"></div>
      </div>
    </template>
  </div>
</section>

<!-- FOOTER -->
<div class="text-center mt-16 text-sm text-gray-500">
  © <span x-text="year"></span> AB Layout
</div>

</div>

<script>
function app(){
  return {
    desc: "Loading...",
    version: "",
    stats: "",
    layouts: [],
    year: new Date().getFullYear(),

    CONFIG: {
      repo: "RatioJuris/ab-layout",
      layouts: "/ab-layout/layouts/layouts.json"
    },

    async init(){
      this.loadTheme();
      await this.loadLayouts();
      this.loadRepoStats();
    },

    /* ===== THEME ===== */
    toggleTheme(){
      const html = document.documentElement;
      const isDark = html.classList.toggle("dark");
      localStorage.setItem("theme", isDark ? "dark" : "light");
    },

    loadTheme(){
      const saved = localStorage.getItem("theme");
      if(saved === "dark"){
        document.documentElement.classList.add("dark");
      }
    },

    /* ===== FETCH LAYOUTS ===== */
    async loadLayouts(){
      try {
        const res = await axios.get(this.CONFIG.layouts, { timeout: 5000 });

        const data = res.data;

        this.desc = data._meta?.description || "";
        this.version = "Version: " + (data._meta?.version || "");
        this.layouts = data.layouts || [];

      } catch (e) {
        console.error("Failed to load layouts", e);
        this.desc = "Unable to load layouts";
      }
    },

    /* ===== GITHUB STATS ===== */
    async loadRepoStats(){
      try {
        const res = await axios.get(`https://api.github.com/repos/${this.CONFIG.repo}`);
        const repo = res.data;

        this.stats = `⭐ ${repo.stargazers_count} • Updated ${new Date(repo.updated_at).toLocaleDateString()}`;

      } catch {}
    },

    /* ===== DOWNLOAD ===== */
    async downloadManifest(){
      const res = await axios.get("manifest.xml", { responseType: "blob" });

      const url = URL.createObjectURL(res.data);
      const a = document.createElement("a");
      a.href = url;
      a.download = "manifest.xml";
      a.click();
      URL.revokeObjectURL(url);
    }
  }
}
</script>

</body>
</html>

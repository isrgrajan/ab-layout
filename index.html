<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AB Layout – Legal Formatting Engine</title>

<meta name="description" content="AB Layout is a Microsoft Word Add-in for Indian legal drafting with automated court formatting." />
<meta name="theme-color" content="#0f6cbd" />

<link rel="canonical" href="https://ratiojuris.github.io/ab-layout/" />
<link rel="icon" href="assets/icon-32.png" />

<style>

/* ===== THEME ===== */

:root {
  --bg:#f9fafb;
  --text:#1f2937;
  --muted:#6b7280;
  --card:#ffffff;
  --border:#e5e7eb;
  --primary:#0f6cbd;
}

[data-theme="dark"] {
  --bg:#1f1f1f;
  --text:#f5f5f5;
  --muted:#b3b3b3;
  --card:#2b2b2b;
  --border:#333;
}

/* ===== BASE ===== */

body {
  margin:0;
  font-family:Segoe UI,system-ui;
  background:var(--bg);
  color:var(--text);
  transition:0.2s;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* ===== HERO ===== */

.hero {
  text-align:center;
  padding:60px 20px;
}

.hero h1 {
  font-size:36px;
  margin-bottom:10px;
}

.hero p {
  color:var(--muted);
}

/* ===== BUTTONS ===== */

.btn {
  padding:12px 18px;
  border-radius:6px;
  font-weight:600;
  margin:6px;
  display:inline-block;
  cursor:pointer;
  text-decoration:none;
}

.primary {
  background:var(--primary);
  color:#fff;
}

.secondary {
  background:var(--card);
  border:1px solid var(--border);
  color:var(--text);
}

/* ===== TOGGLE ===== */

.toggle {
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
  opacity:0.7;
}

/* ===== GRID ===== */

.section {
  margin-top:50px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.card {
  background:var(--card);
  border:1px solid var(--border);
  padding:16px;
  border-radius:8px;
  transition:0.2s;
}

.card:hover {
  transform:translateY(-2px);
}

/* ===== FOOTER ===== */

.footer {
  text-align:center;
  margin-top:60px;
  color:var(--muted);
  font-size:13px;
}

.signature {
  margin-top:6px;
  opacity:0.6;
  font-style:italic;
}

.status {
  margin-top:10px;
  font-size:13px;
  color:var(--muted);
}

</style>

</head>

<body>

<div class="toggle" onclick="toggleTheme()">🌗</div>

<div class="container">

<!-- HERO -->
<section class="hero">
  <h1>⚖ AB Layout</h1>
  <p id="desc">Loading layout engine...</p>

  <a class="btn primary" onclick="downloadManifest(event)">
    ⬇ Install Add-in
  </a>

  <a class="btn secondary" href="https://github.com/RatioJuris/ab-layout">
    GitHub
  </a>

  <div class="status" id="stats"></div>
  <div class="status" id="version"></div>
</section>

<!-- LAYOUTS -->
<section class="section">
  <h2>📄 Layouts</h2>
  <div class="grid" id="layouts"></div>
</section>

<!-- FOOTER -->
<div class="footer">
  © <span id="year"></span> AB Layout  
  <div class="signature">
    Crafted with ⚖️ + ❤️ by RatioJuris  
    <br/>
    Built once, refined endlessly
  </div>
</div>

</div>

<script>

/* ===== INIT ===== */
document.getElementById("year").innerText = new Date().getFullYear();

/* ===== THEME ===== */
function toggleTheme(){
  const html = document.documentElement;
  const current = html.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
}

(function(){
  const saved = localStorage.getItem("theme");
  if(saved){
    document.documentElement.setAttribute("data-theme", saved);
  }
})();

/* ===== LOAD LAYOUTS ===== */
async function loadLayouts(){
  try {
    const res = await fetch("/ab-layout/layouts/layouts.json", {
      cache: "no-store"
    });

    if(!res.ok) throw new Error("Fetch failed");

    const data = await res.json();

    document.getElementById("desc").innerText =
      data._meta?.description || "Legal formatting engine";

    document.getElementById("version").innerText =
      "Version: " + (data._meta?.version || "N/A");

    const container = document.getElementById("layouts");
    container.innerHTML = "";

    (data.layouts || []).forEach(l=>{
      const el = document.createElement("div");
      el.className = "card";
      el.innerHTML = `
        <strong>${l.name}</strong><br/>
        <small>${l.type}</small>
      `;
      container.appendChild(el);
    });

  } catch (e){
    console.error(e);
    document.getElementById("desc").innerText =
      "Unable to load layouts";
  }
}

/* ===== GITHUB STATS ===== */
async function loadRepo(){
  try {
    const res = await fetch("https://api.github.com/repos/RatioJuris/ab-layout");
    const repo = await res.json();

    if(repo?.stargazers_count !== undefined){
      document.getElementById("stats").innerText =
        `⭐ ${repo.stargazers_count} • Updated ${new Date(repo.updated_at).toLocaleDateString()}`;
    }

  } catch {}
}

/* ===== DOWNLOAD ===== */
async function downloadManifest(e){
  e.preventDefault();

  try {
    const res = await fetch("manifest.xml");
    const blob = await res.blob();

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");

    a.href = url;
    a.download = "manifest.xml";
    a.click();

    URL.revokeObjectURL(url);

  } catch {
    alert("Download failed");
  }
}

/* ===== START ===== */
loadLayouts();
loadRepo();

</script>

</body>
</html>

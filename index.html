<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AB Layout – Legal Formatting Engine</title>

<!-- SEO / META -->
<meta name="description" content="AB Layout is a Microsoft Word Add-in for Indian legal drafting with automated court formatting." />
<meta name="theme-color" content="#0f6cbd" />

<!-- Open Graph -->
<meta property="og:title" content="AB Layout" />
<meta property="og:description" content="Legal formatting engine for advocates." />
<meta property="og:type" content="website" />

<style>

/* ===== THEME SYSTEM ===== */

:root {
  --bg:#f9fafb;
  --text:#1f2937;
  --muted:#6b7280;
  --card:#ffffff;
  --border:#e5e7eb;
  --primary:#0f6cbd;
  --link:#0f6cbd;
}

/* DARK */
[data-theme="dark"] {
  --bg:#1f1f1f;
  --text:#f5f5f5;
  --muted:#b3b3b3;
  --card:#2b2b2b;
  --border:#333;
  --primary:#4cc2ff;
  --link:#4cc2ff;
}

/* AUTO MODE */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    --bg:#1f1f1f;
    --text:#f5f5f5;
    --muted:#b3b3b3;
    --card:#2b2b2b;
    --border:#333;
    --primary:#4cc2ff;
    --link:#4cc2ff;
  }
}

body {
  margin:0;
  font-family:"Segoe UI",system-ui;
  background:var(--bg);
  color:var(--text);
  transition: all 0.2s ease;
}

a {
  color:var(--link);
  text-decoration:none;
}
a:hover {
  text-decoration:underline;
}

/* ===== LAYOUT ===== */

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.hero {
  text-align:center;
  padding:60px 20px;
}

.hero h1 {
  font-size:36px;
  margin-bottom:10px;
}

.hero p {
  color:var(--muted);
}

/* ===== BUTTONS ===== */

.btn {
  padding:12px 18px;
  border-radius:6px;
  text-decoration:none;
  font-weight:600;
  margin:6px;
  display:inline-block;
}

.primary {
  background:var(--primary);
  color:#fff;
}

.secondary {
  background:var(--card);
  border:1px solid var(--border);
}

/* ===== THEME TOGGLE ===== */

.toggle {
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
  font-size:14px;
}

/* ===== CONTENT ===== */

.section { margin-top:50px; }

.card {
  background:var(--card);
  border:1px solid var(--border);
  padding:16px;
  border-radius:8px;
  margin-top:10px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.footer {
  text-align:center;
  margin-top:60px;
  color:var(--muted);
  font-size:13px;
}

</style>
</head>

<body>

<div class="toggle" onclick="toggleTheme()">🌗 Theme</div>

<div class="container">

<section class="hero">
  <h1>⚖ AB Layout</h1>
  <p id="desc">Loading...</p>

  <!-- FIXED: FORCE DOWNLOAD -->
  <a class="btn primary" href="manifest.xml" download>
    ⬇ Install Add-in
  </a>

  <a class="btn secondary" href="https://github.com/RatioJuris/ab-layout">
    GitHub
  </a>

  <div id="stats"></div>
  <div id="version"></div>
</section>

<section class="section">
  <h2>📄 Layouts</h2>
  <div class="grid" id="layouts"></div>
</section>

<div class="footer">
  © <span id="year"></span> AB Layout  
</div>

</div>

<script>

/* ===== THEME SYSTEM ===== */

function toggleTheme(){
  const current = document.documentElement.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";

  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
}

// Load saved theme
const saved = localStorage.getItem("theme");
if(saved){
  document.documentElement.setAttribute("data-theme", saved);
}

/* ===== DATA ===== */

const CONFIG = {
  repo:"RatioJuris/ab-layout",
  layouts:"https://ratiojuris.github.io/ab-layout/layouts/layouts.json"
};

document.getElementById("year").innerText=new Date().getFullYear();

/* ===== META + LAYOUTS ===== */

fetch(CONFIG.layouts)
.then(r=>r.json())
.then(data=>{
  document.getElementById("version").innerText="Version: "+data._meta.version;
  document.getElementById("desc").innerText=data._meta.description;

  const container=document.getElementById("layouts");

  data.layouts.forEach(l=>{
    const el=document.createElement("div");
    el.className="card";
    el.innerHTML=`<strong>${l.name}</strong><br/><small>${l.type}</small>`;
    container.appendChild(el);
  });
});

/* ===== GITHUB ===== */

fetch(`https://api.github.com/repos/${CONFIG.repo}`)
.then(r=>r.json())
.then(repo=>{
  document.getElementById("stats").innerText =
    `⭐ ${repo.stargazers_count} • Updated ${new Date(repo.updated_at).toLocaleDateString()}`;
});

</script>

</body>
</html>

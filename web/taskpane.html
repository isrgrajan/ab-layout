<!--
AB Layout (Advocate Benefit Layout)
Version: 1.0.0

Description:
Production-ready UI for Microsoft Word task pane.
Provides court selection and layout actions.

Author:
Bee Isrg Rajan

Repository:
https://github.com/isrgrajan/ab-layout
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AB Layout</title>

  <!-- Office JS -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="title-row">
      <span class="icon">⚖</span>
      <h1>AB Layout</h1>
    </div>
    <p class="subtitle">Advocate Benefit Layout</p>
  </header>

  <!-- Divider -->
  <hr />

  <!-- Main Content -->
  <main>

    <!-- State Selection -->
    <section class="section">
      <label for="stateSelect">State</label>
      <select id="stateSelect" aria-label="Select State"></select>
    </section>

    <!-- Court Selection -->
    <section class="section">
      <label for="courtSelect">Court</label>
      <select id="courtSelect" aria-label="Select Court"></select>
    </section>

    <!-- Actions -->
    <section class="actions">
      <button id="applyBtn" onclick="applySelected()" disabled>
        Apply Layout
      </button>

      <button id="undoBtn" class="secondary" onclick="undoLayout()">
        Undo
      </button>
    </section>

    <!-- Status -->
    <section id="status" class="status" role="status" aria-live="polite">
      Initializing...
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <span>v1.0.0</span>
    <span> • </span>
    <span>AB Layout</span>
  </footer>

  <!-- Script -->
  <script src="taskpane.js"></script>

</body>
</html>

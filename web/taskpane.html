<!--
AB Layout (Advocate Benefit Layout)
Version: 2.0.0

Description:
Engine-driven UI for Microsoft Word Add-in with dynamic state sync.

Maintainer:
RatioJuris
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>AB Layout</title>

  <!-- Office JS -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="title-row">
      <span class="icon">⚖</span>
      <h1>AB Layout</h1>
    </div>
    <div class="subtitle" id="subtitle">Advocate Benefit Layout</div>
  </header>

  <hr />

  <!-- Main -->
  <main>

    <!-- Layout Selection -->
    <section class="section">
      <label for="courtSelect">Layout</label>
      <select id="courtSelect"></select>
    </section>

    <!-- Actions -->
    <section class="section">
      <button id="applyBtn" onclick="applySelected()" disabled>
        Apply Layout
      </button>

      <button id="undoBtn" class="secondary" onclick="undoLayout()" disabled>
        Undo
      </button>
    </section>

    <!-- Status -->
    <section id="status" class="status" aria-live="polite">
      Initializing engine...
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <span id="version">v2.0.0</span>
    <span> • </span>
    <span id="engineState">Engine Ready</span>
  </footer>

  <!-- Script -->
  <script src="taskpane.js"></script>

  <!-- UI Intelligence Layer -->
  <script>
    const CONFIG = {
      metaUrl: "https://ratiojuris.github.io/ab-layout/layouts/layouts.json"
    };

    const UI = {
      version: document.getElementById("version"),
      subtitle: document.getElementById("subtitle"),
      status: document.getElementById("status"),
      applyBtn: document.getElementById("applyBtn"),
      undoBtn: document.getElementById("undoBtn"),
      engineState: document.getElementById("engineState")
    };

    /* ===== Dynamic Meta Sync ===== */

    fetch(CONFIG.metaUrl)
      .then(res => res.json())
      .then(data => {
        const meta = data._meta || {};

        if (meta.version) {
          UI.version.innerText = "v" + meta.version;
        }

        if (meta.description) {
          UI.subtitle.innerText = meta.description;
        }
      })
      .catch(() => {
        // silent fallback
      });

    /* ===== UI Hooks (Engine Integration) ===== */

    // Called from engine
    function uiSetStatus(message, type = "info") {
      UI.status.innerText = message;

      UI.status.style.color =
        type === "error" ? "#dc2626" :
        type === "success" ? "#16a34a" :
        "#6b7280";
    }

    function uiSetEngineState(state) {
      UI.engineState.innerText = state;
    }

    function uiEnableApply(enable) {
      UI.applyBtn.disabled = !enable;
    }

    function uiEnableUndo(enable) {
      UI.undoBtn.disabled = !enable;
    }

    /* ===== Theme Sync with Word ===== */

    Office.onReady(() => {
      try {
        const theme = Office.context.officeTheme;

        if (theme?.bodyBackgroundColor) {
          document.body.style.backgroundColor = theme.bodyBackgroundColor;
          document.body.style.color = theme.bodyForegroundColor;
        }

      } catch (e) {
        // fallback to CSS
      }
    });
  </script>

</body>
</html>

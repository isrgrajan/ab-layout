<!--
AB Layout (Advocate Benefit Layout)
Version: 1.1.0

Description:
Modern, Microsoft Word-like UI with auto theme support.

Author:
Bee Isrg Rajan
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>AB Layout</title>

  <!-- Office JS -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="title-row">
      <span class="icon">⚖</span>
      <h1>AB Layout</h1>
    </div>
    <div class="subtitle">Advocate Benefit Layout</div>
  </header>

  <hr />

  <!-- Main -->
  <main>

    <!-- Layout Selection -->
    <section class="section">
      <label for="courtSelect">Layout</label>
      <select id="courtSelect"></select>
    </section>

    <!-- Actions -->
    <section class="section">
      <button id="applyBtn" onclick="applySelected()" disabled>
        Apply Layout
      </button>

      <button id="undoBtn" class="secondary" onclick="undoLayout()">
        Undo
      </button>
    </section>

    <!-- Status -->
    <section id="status" class="status" aria-live="polite">
      Initializing...
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <span id="version">v1.1.0</span>
    <span> • </span>
    <span>AB Layout</span>
  </footer>

  <!-- Script -->
  <script src="taskpane.js"></script>

  <!-- Theme Sync with Word -->
  <script>
    Office.onReady(() => {
      try {
        const officeTheme = Office.context.officeTheme;

        if (officeTheme && officeTheme.bodyBackgroundColor) {
          document.body.style.backgroundColor = officeTheme.bodyBackgroundColor;
          document.body.style.color = officeTheme.bodyForegroundColor;
        }
      } catch (e) {
        // fallback to CSS auto theme
      }
    });
  </script>

</body>
</html>
